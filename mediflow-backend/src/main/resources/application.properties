spring.application.name=mediflow-backend

server.port=8080

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/mediflow}
spring.datasource.username=${DB_USERNAME:mediflow_user}
spring.datasource.password=${DB_PASSWORD:mediflow_password}

spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:mediflow_user}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:mediflow_password}
spring.rabbitmq.virtual-host=${RABBITMQ_VIRTUAL_HOST:/}
spring.rabbitmq.connection-timeout=5s
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.max-retries=2
spring.rabbitmq.listener.simple.retry.initial-interval=1s
spring.rabbitmq.listener.simple.retry.multiplier=2.0
spring.rabbitmq.listener.simple.retry.max-interval=2s
spring.rabbitmq.listener.simple.default-requeue-rejected=false

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

spring.flyway.enabled=true

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

app.jwt.secret=${JWT_SECRET:mediflow-local-development-secret-key-change-before-deployment-2026}
app.jwt.issuer=${JWT_ISSUER:mediflow-backend}
app.jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:3600}

app.razorpay.key-id=${RAZORPAY_KEY_ID:}
app.razorpay.key-secret=${RAZORPAY_KEY_SECRET:}
app.razorpay.webhook-secret=${RAZORPAY_WEBHOOK_SECRET:}
app.razorpay.api-base-url=${RAZORPAY_API_BASE_URL:https://api.razorpay.com}
# Email
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.connectiontimeout=5000
spring.mail.properties.mail.timeout=5000
spring.mail.properties.mail.writetimeout=5000

app.mail.from=${MAIL_FROM:${MAIL_USERNAME:}}