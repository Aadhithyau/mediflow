spring.application.name=mediflow-backend

server.port=8080

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/mediflow}
spring.datasource.username=${DB_USERNAME:mediflow_user}
spring.datasource.password=${DB_PASSWORD:mediflow_password}

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

spring.flyway.enabled=true

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always